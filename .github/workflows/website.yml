name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'manual/**'
      - 'dna2graph/assets/defaults.json'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compile LaTeX PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: manual/manual.tex

      - name: Prepare website assets
        run: |
          mkdir -p website/assets/docs
          cp manual/manual.pdf website/assets/docs/
          cp dna2graph/assets/defaults.json website/assets/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4